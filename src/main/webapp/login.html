<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>漂泊者登录</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #161616; padding: 40px; border-radius: 15px; border: 1px solid #333; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f39c12; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2 style="color: #f39c12;">终端身份验证</h2>
    <input type="text" id="username" placeholder="通行证账号">
    <input type="password" id="password" placeholder="验证密码">
    <button onclick="doLogin()">同步档案</button>
</div>

<script>
    async function doLogin() {
        const params = new URLSearchParams();
        params.append('username', document.getElementById('username').value);
        params.append('password', document.getElementById('password').value);

        const response = await fetch('/api/user/login', { method: 'POST', body: params });
        const result = await response.text();
        if (result === 'success') {
            alert("身份验证成功！欢迎回来，漂泊者。");
            window.location.href = 'index.html'; // 登录成功跳回首页
        } else {
            alert("身份验证失败，请检查账号密码。");
        }
    }
</script>
</body>
</html>
