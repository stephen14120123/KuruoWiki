<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KuruoWiki - 声骸图鉴</title>
    <style>
        body {
            background-color: #080a0a;
            color: #e0e0e0;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 全局导航栏 */
        .top-nav {
            background-color: #161a16;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid #2ecc7133;
        }

        .top-nav a {
            color: #f2f2f2;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            margin: 0 20px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .top-nav a:hover {
            background-color: #2ecc71;
            color: #1a1a1a;
        }

        h1 {
            text-align: center;
            color: #2ecc71;
            margin: 40px 0 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        /* 筛选控制台 */
        .filter-console {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        /* 专为声骸库定制的绿色主题搜索框 */
        .search-input {
            padding: 10px 15px;
            background: #0f1411;
            border: 1px solid #223322;
            color: #fff;
            border-radius: 8px;
            outline: none;
            width: 250px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .search-input:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4), inset 0 2px 4px rgba(0,0,0,0.5);
            background: #111a14;
        }

        .search-input::placeholder {
            color: #556655;
        }

        .filter-select {
            padding: 10px 15px;
            background: #111a14;
            border: 1px solid #2ecc71;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        .filter-select:hover {
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.4);
        }

        /* 网格布局 */
        .echo-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            justify-content: center;
        }

        .echo-card {
            background-color: #0f1411;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            border: 1px solid #223322;
            transition: transform 0.3s ease, border-color 0.3s ease;
            aspect-ratio: 16 / 9;
        }

        .echo-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
        }

        .echo-img-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* 底部遮罩文字层 */
        .echo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top,
            rgba(0, 0, 0, 0.95) 0%,
            rgba(0, 0, 0, 0.6) 45%,
            transparent 100%);
            color: #fff;
            padding: 20px;
            z-index: 2;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .echo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .echo-name {
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .cost-badge {
            background-color: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #2ecc71;
            backdrop-filter: blur(4px);
        }

        .sonata-tag {
            font-size: 13px;
            color: #d2b4de;
            margin-bottom: 10px;
            display: block;
        }

        /* 技能描述盒 */
        .skill-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #2ecc71;
            backdrop-filter: blur(6px);
        }

        .skill-desc {
            color: #bbb;
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 空状态提示 */
        .empty-state {
            text-align: center;
            width: 100%;
            color: #666;
            font-size: 16px;
            padding: 40px 0;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">角色库</a>
    <a href="weapons.html">武器库</a>
    <a href="echoes.html">声骸库</a>
</nav>

<h1>✦ 数据坞 - 声骸图鉴 ✦</h1>

<div class="filter-console">
    <input type="text" id="searchInput" class="search-input" placeholder="✦ 输入声骸名称检索..." oninput="applyFilters()">

    <select id="costFilter" class="filter-select" onchange="applyFilters()">
        <option value="0">✦ 全部 COST</option>
        <option value="4">COST 4 (领主级)</option>
        <option value="3">COST 3 (精英级)</option>
        <option value="1">COST 1 (基准级)</option>
    </select>

    <select id="sonataFilter" class="filter-select" onchange="applyFilters()">
        <option value="全部">✦ 全部合鸣属性</option>
        <option value="沉日劫明">沉日劫明</option>
        <option value="凝夜白霜">凝夜白霜</option>
        <option value="彻空冥雷">彻空冥雷</option>
        <option value="熔山裂谷">熔山裂谷</option>
        <option value="隐世回光">隐世回光</option>
        <option value="轻云出月">轻云出月</option>
        <option value="浮星祛暗">浮星祛暗</option>
        <option value="啸谷长风">啸谷长风</option>
        <option value="不绝余音">不绝余音</option>
    </select>
</div>

<div class="echo-container" id="echoList">
    <p style="text-align: center; width: 100%; color: #666;">正在连接数据坞同步数据...</p>
</div>

<script>
    let allEchoes = [];

    async function loadEchoes() {
        try {
            const response = await fetch('/api/echo/list');
            allEchoes = await response.json();
            renderEchoes(allEchoes);
        } catch (error) {
            console.error('连接失败:', error);
            document.getElementById('echoList').innerHTML = '<p class="empty-state">连接终端失败，请检查网络或后端服务...</p>';
        }
    }

    function renderEchoes(dataList) {
        const listDiv = document.getElementById('echoList');
        listDiv.innerHTML = '';

        if (!dataList || dataList.length === 0) {
            listDiv.innerHTML = '<p class="empty-state">数据坞中未检索到匹配的声骸记录，请更换关键词或条件。</p>';
            return;
        }

        dataList.forEach(e => {
            const card = document.createElement('div');
            card.className = 'echo-card';

            // 兼容性处理
            const imgPath = e.imageUrl || e.imgPath || 'images/default_echo.png';

            card.innerHTML = `
                <div class="echo-img-box">
                    <img src="${imgPath}" alt="${e.name}" onerror="this.style.display='none'">
                </div>
                <div class="echo-overlay">
                    <div class="echo-header">
                        <h3 class="echo-name">${e.name}</h3>
                        <span class="cost-badge">COST ${e.cost}</span>
                    </div>
                    <span class="sonata-tag">✦ 合鸣：${e.sonataEffect || '未录入'}</span>
                    <div class="skill-box">
                        <p class="skill-desc">${e.skillDesc || '暂无声骸技能描述...'}</p>
                    </div>
                </div>
            `;
            listDiv.appendChild(card);
        });
    }

    // 三维联动过滤函数 (搜索词 + COST + 合鸣属性)
    function applyFilters() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const cost = document.getElementById('costFilter').value;
        const sonata = document.getElementById('sonataFilter').value;

        const filtered = allEchoes.filter(e => {
            // 1. 匹配声骸名称 (模糊搜索)
            const matchName = e.name.toLowerCase().includes(keyword);
            // 2. 匹配 COST 值
            const matchCost = (cost === '0') || (e.cost == cost);
            // 3. 匹配合鸣套装
            const matchSonata = (sonata === '全部') || (e.sonataEffect === sonata);

            return matchName && matchCost && matchSonata;
        });

        renderEchoes(filtered);
    }

    loadEchoes();
</script>
</body>
</html>
