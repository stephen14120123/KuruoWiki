<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>KuruoWiki - 武器武库</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 全局导航栏 */
        .top-nav {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            border-bottom: 1px solid #f39c1233;
        }

        .top-nav a {
            color: #f2f2f2;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            margin: 0 20px;
            padding: 8px 16px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .top-nav a:hover {
            background-color: #d4a373;
            color: #1a1a1a;
        }

        h1 {
            text-align: center;
            color: #f39c12;
            margin: 40px 0 20px;
            letter-spacing: 2px;
        }

        /* 筛选控制台：加入了搜索框的样式 */
        .filter-console {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap; /* 屏幕变窄时自动换行 */
        }

        /* 炫酷的搜索框样式 */
        .search-input {
            padding: 10px 15px;
            background: #111;
            border: 1px solid #555;
            color: #fff;
            border-radius: 8px;
            outline: none;
            width: 250px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        /* 搜索框聚焦时的发光效果 */
        .search-input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 12px rgba(243, 156, 18, 0.4), inset 0 2px 4px rgba(0,0,0,0.5);
            background: #1a1a1a;
        }

        .search-input::placeholder {
            color: #666;
        }

        .filter-select {
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #f39c12;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }

        .weapon-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            justify-content: center;
        }

        .weapon-card {
            background-color: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease;
            aspect-ratio: 16 / 9;
        }

        .weapon-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(243, 156, 18, 0.4);
            border-color: #f39c12;
        }

        .weapon-img-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .weapon-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top,
            rgba(0, 0, 0, 0.9) 0%,
            rgba(0, 0, 0, 0.5) 40%,
            transparent 100%);
            color: #fff;
            padding: 20px;
            z-index: 2;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .weapon-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .weapon-name {
            color: #fce8ac;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .weapon-type-tag {
            background-color: rgba(0,0,0,0.6);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #fce8ac;
            border: 1px solid rgba(252, 232, 172, 0.3);
            backdrop-filter: blur(4px);
        }

        .stat-row {
            display: flex;
            gap: 25px;
            margin-bottom: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #bbb;
            font-size: 12px;
            margin-bottom: 2px;
        }

        .stat-val {
            color: #fce8ac;
            font-size: 20px;
            font-weight: bold;
        }

        .skill-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid #79c5e3;
            backdrop-filter: blur(4px);
        }

        .skill-box strong {
            color: #79c5e3;
            font-size: 15px;
            display: block;
            margin-bottom: 4px;
        }

        .skill-desc {
            color: #ddd;
            margin: 0;
            font-size: 13px;
            line-height: 1.4;
        }

        .rarity-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            z-index: 3;
        }
        .bg-5star { background: #f1c40f; }
        .bg-4star { background: #9b59b6; }
        .bg-3star { background: #3498db; }

        /* 搜索为空时的提示文字 */
        .empty-state {
            text-align: center;
            width: 100%;
            color: #888;
            font-size: 16px;
            padding: 40px 0;
            grid-column: 1 / -1; /* 让提示文字占满整行 */
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <a href="index.html">角色库</a>
    <a href="weapons.html">武器库</a>
    <a href="echoes.html">声骸库</a>
</nav>

<h1>✦ 武器武库 ✦</h1>

<div class="filter-console">
    <input type="text" id="searchInput" class="search-input" placeholder="✦ 输入武器名称检索..." oninput="applyFilters()">

    <select id="typeFilter" class="filter-select" onchange="applyFilters()">
        <option value="全部">✦ 全部武器类型</option>
        <option value="迅刀">迅刀</option>
        <option value="长刃">长刃</option>
        <option value="佩枪">佩枪</option>
        <option value="臂铠">臂铠</option>
        <option value="音感仪">音感仪</option>
    </select>

    <select id="rarityFilter" class="filter-select" onchange="applyFilters()">
        <option value="0">✦ 全部星级</option>
        <option value="5">5星 武器</option>
        <option value="4">4星 武器</option>
        <option value="3">3星 武器</option>
    </select>
</div>

<div class="weapon-container" id="weaponList">
    <p style="text-align: center; width: 100%; color: #666;">正在同步终端数据...</p>
</div>

<script>
    let allWeapons = [];

    async function loadWeapons() {
        try {
            const response = await fetch('/api/weapon/list');
            allWeapons = await response.json();
            renderWeapons(allWeapons);
        } catch (error) {
            console.error('加载失败:', error);
            document.getElementById('weaponList').innerHTML = '<p class="empty-state">连接失败，请检查数据链路...</p>';
        }
    }

    function renderWeapons(dataList) {
        const listDiv = document.getElementById('weaponList');
        listDiv.innerHTML = '';

        // 增加了搜索结果为空时的优雅提示
        if (!dataList || dataList.length === 0) {
            listDiv.innerHTML = '<p class="empty-state">未检索到匹配的武器档案，请尝试更换关键词。</p>';
            return;
        }

        dataList.forEach(w => {
            const card = document.createElement('div');
            card.className = 'weapon-card';

            const imgPath = (w.imageUrl && w.imageUrl !== "") ? w.imageUrl : 'images/default_weapon.png';
            let rarityClass = 'bg-3star';
            if(w.rarity === 5) rarityClass = 'bg-5star';
            else if(w.rarity === 4) rarityClass = 'bg-4star';

            card.innerHTML = `
                <div class="rarity-bar ${rarityClass}"></div>
                <div class="weapon-img-box">
                    <img src="${imgPath}" alt="${w.name}" onerror="this.style.display='none'">
                </div>
                <div class="weapon-overlay">
                    <div class="weapon-header">
                        <h3 class="weapon-name">${w.name}</h3>
                        <span class="weapon-type-tag">${w.weaponType} | ${w.rarity}星</span>
                    </div>
                    <div class="stat-row">
                        <div class="stat-item">
                            <span class="stat-label">基础攻击</span>
                            <span class="stat-val">${w.baseAtk || '0'}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">${w.subStatType || '副词条'}</span>
                            <span class="stat-val" style="color:#f39c12">${w.subStatValue || '0'}</span>
                        </div>
                    </div>
                    <div class="skill-box">
                        <strong>✦ ${w.skillName || '武器技能'}</strong>
                        <p class="skill-desc">${w.skillDesc || '暂无详细描述...'}</p>
                    </div>
                </div>
            `;
            listDiv.appendChild(card);
        });
    }

    // 升级版的多维度过滤函数
    function applyFilters() {
        // 获取三个控件的值
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase(); // 获取搜索词并转小写
        const type = document.getElementById('typeFilter').value;
        const rarity = document.getElementById('rarityFilter').value;

        // 核心过滤逻辑
        const filtered = allWeapons.filter(w => {
            // 1. 匹配名称 (如果输入框为空，includes('') 会返回 true)
            const matchName = w.name.toLowerCase().includes(keyword);
            // 2. 匹配类型
            const matchType = (type === '全部') || (w.weaponType === type);
            // 3. 匹配星级
            const matchRarity = (rarity === '0') || (w.rarity == rarity);

            // 必须三个条件同时满足才显示
            return matchName && matchType && matchRarity;
        });

        // 重新渲染卡片
        renderWeapons(filtered);
    }

    loadWeapons();
</script>
</body>
</html>
